<svg class="hero-background" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 
                Gradients use userSpaceOnUse and stretch across 2880px (2x viewport width).
                The stops repeat exactly at the 50% mark (1440px) so when the path translates
                back to 0, the color profile matches perfectly with zero flicker.
            -->
            
            <!-- Deep, slow background wave gradient -->
            <linearGradient id="wave1" x1="0" y1="0" x2="2880" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="rgb(0,109,76)" stop-opacity="0.9"/>
                <stop offset="25%" stop-color="rgb(12,126,109)" stop-opacity="0.4"/>
                <stop offset="50%" stop-color="rgb(0,109,76)" stop-opacity="0.9"/>
                <stop offset="75%" stop-color="rgb(12,126,109)" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="rgb(0,109,76)" stop-opacity="0.9"/>
            </linearGradient>

            <!-- Mid-layer gradient, introducing the bright tech green -->
            <linearGradient id="wave2" x1="0" y1="0" x2="2880" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="rgb(12,126,109)" stop-opacity="0.6"/>
                <stop offset="25%" stop-color="rgb(51,255,167)" stop-opacity="0.2"/>
                <stop offset="50%" stop-color="rgb(12,126,109)" stop-opacity="0.6"/>
                <stop offset="75%" stop-color="rgb(51,255,167)" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="rgb(12,126,109)" stop-opacity="0.6"/>
            </linearGradient>

            <!-- Bright, glowing wave gradient -->
            <linearGradient id="wave3" x1="0" y1="0" x2="2880" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="rgb(51,255,167)" stop-opacity="0.5"/>
                <stop offset="25%" stop-color="rgb(0,109,76)" stop-opacity="0.8"/>
                <stop offset="50%" stop-color="rgb(51,255,167)" stop-opacity="0.5"/>
                <stop offset="75%" stop-color="rgb(0,109,76)" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="rgb(51,255,167)" stop-opacity="0.5"/>
            </linearGradient>

            <!-- Foreground anchor wave gradient -->
            <linearGradient id="wave4" x1="0" y1="0" x2="2880" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="rgb(0,109,76)" stop-opacity="0.95"/>
                <stop offset="25%" stop-color="rgb(51,255,167)" stop-opacity="0.6"/>
                <stop offset="50%" stop-color="rgb(0,109,76)" stop-opacity="0.95"/>
                <stop offset="75%" stop-color="rgb(51,255,167)" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="rgb(0,109,76)" stop-opacity="0.95"/>
            </linearGradient>

            <!-- SVG Glow Filter for the tech aesthetic -->
            <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <!-- 
            Wave Paths:
            Each path covers 2880px width (exactly 2x the standard 1440px viewport).
            The translation shifts the paths left by exactly 1440px in an infinite linear loop.
            Due to perfect geometric mirroring in the cubic curves, the loop is mathematically seamless.
        -->
        <g>
            <!-- Layer 1: Background Wave (Slowest) -->
            <path fill="url(#wave1)" d="M 0,350 C 250,150 470,550 720,350 C 970,150 1190,550 1440,350 C 1690,150 1910,550 2160,350 C 2410,150 2630,550 2880,350 V 800 H 0 Z">
                <animateTransform attributeName="transform" type="translate" from="0 0" to="-1440 0" dur="25s" repeatCount="indefinite" />
            </path>
            
            <!-- Layer 2: Mid-Back Wave -->
            <path fill="url(#wave2)" d="M 0,450 C 300,650 420,250 720,450 C 1020,650 1140,250 1440,450 C 1740,650 1860,250 2160,450 C 2460,650 2580,250 2880,450 V 800 H 0 Z">
                <animateTransform attributeName="transform" type="translate" from="0 0" to="-1440 0" dur="20s" repeatCount="indefinite" />
            </path>

            <!-- Layer 3: Mid-Front Wave with Neon Glow -->
            <path fill="url(#wave3)" filter="url(#neon-glow)" d="M 0,550 C 200,400 520,700 720,550 C 920,400 1240,700 1440,550 C 1640,400 1960,700 2160,550 C 2360,400 2680,700 2880,550 V 800 H 0 Z">
                <animateTransform attributeName="transform" type="translate" from="0 0" to="-1440 0" dur="14s" repeatCount="indefinite" />
            </path>

            <!-- Layer 4: Foreground Wave (Fastest) -->
            <path fill="url(#wave4)" d="M 0,650 C 350,800 370,500 720,650 C 1070,800 1090,500 1440,650 C 1790,800 1810,500 2160,650 C 2510,800 2530,500 2880,650 V 800 H 0 Z">
                <animateTransform attributeName="transform" type="translate" from="0 0" to="-1440 0" dur="9s" repeatCount="indefinite" />
            </path>
        </g>
    </svg>
